# my_macros.cfg v 1.5 11.04.2026

############################################################

[gcode_macro G29]
gcode:
  G28
  BED_MESH_CALIBRATE
  SAVE_CONFIG
  G1 X0 Y0 Z5 F4000

############################################################
# ─────────────────────────────────────────────────────────────
# 1) "Schowek" na stan – tu trzymamy informację o trybie mesha
# ─────────────────────────────────────────────────────────────
[gcode_macro STATE_STORE]
variable_mesh_mode: 0        # 0=LOAD, 1=CALIBRATE
gcode:
    # puste – tylko pojemnik na zmienne


# ─────────────────────────────────────────────────────────────
# 2) START_PRINT – homing, mesh (load/scan), purge line
#    Wywołanie:
#      START_PRINT BED_TEMP=60 EXTRUDER_TEMP=235 MESH=0  (wczytaj)
#      START_PRINT BED_TEMP=60 EXTRUDER_TEMP=235 MESH=1  (skalibruj)
# ─────────────────────────────────────────────────────────────
[gcode_macro START_PRINT]
description: Start z obsługą MESH=0/1, najpierw grzeje stół, potem G28, mesh i purge
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|int %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|int %}
   
    M117 Start...
    G90
    M82
    G92 E0

    # -------------------------
    # FAZA 1 – nagrzanie stołu i wstępne grzanie dyszy
    # -------------------------
    M140 S{BED_TEMP}          ; grzej stół (bez czekania)
    M104 S150                 ; lekko podgrzej hotend, by nie kapał
    M190 S{BED_TEMP}          ; czekaj aż stół osiągnie temperaturę

    # -------------------------
    # FAZA 2 – homing i mesh
    # -------------------------
    G28                       ; home wszystkich osi (na gorącym stole)
    BED_MESH_CLEAR
    M117 Mesh: calibrate
    BED_MESH_CALIBRATE           ; BLTouch mierzy siatkę
    G91
    G1 Z30 F1200                 ; unieś 30 mm
    G90
   ; G1 X0 Y1 F6000           ; odjedź w lewy przedni róg
  
    # -------------------------
    # FAZA 3 – dogrzanie do druku i purge
    # -------------------------
    M109 S{EXTRUDER_TEMP}           ; dogrzewanie do temperatury druku
    LINE_PURGE
  
    G92 E0
    M117 Printing...

# ─────────────────────────────────────────────────────────────
# 3) END_PRINT – park, wyłącz, (opcjonalnie) zapis siatki
#    Jeśli START_PRINT miał MESH=1 → zapisze mesh do "default"
# ─────────────────────────────────────────────────────────────
[gcode_macro END_PRINT]
description: Koniec wydruku – parkowanie, wyłączenie, warunkowy zapis mesha
gcode:
    {% set PARK_X = params.PARK_X|default(10)|int %}
    {% set PARK_Y = params.PARK_Y|default(230)|int %}
    {% set LIFT_Z = params.LIFT_Z|default(5)|int %}

    M117 Ending...
    G91
    G1 E-2 F1800             ; mała retrakcja
    G1 Z{LIFT_Z} F1200       ; unieś głowicę
    G90
    G1 X{PARK_X} Y{PARK_Y} F6000  ; parkuj
    M106 S0                  ; wentylator off
    TURN_OFF_HEATERS
    M84 X Y E                ; zwolnij X/Y/E (Z zwykle zostawiam utrzymane)

   
############################################################

[gcode_macro UNLOAD_FILAMENT]
description: Safe filament unload for Bowden setup
variable_unload_distance: 430
variable_nozzle_preheat_temp: 220
variable_turn_off_extruder: 0
variable_push_distance: 3
variable_push_speed: 180
variable_unload_speed: 900
gcode:
    {% set macro = printer["gcode_macro UNLOAD_FILAMENT"] %}
    {% set target_temp = params.TARGET_TEMP|default(macro.nozzle_preheat_temp)|float %}
    {% set min_temp = params.MIN_TEMP|default(180)|float %}
    {% set unload_distance = params.UNLOAD_DISTANCE|default(macro.unload_distance)|float %}
    {% set push_distance = params.PUSH_DISTANCE|default(macro.push_distance)|float %}
    {% set push_speed = params.PUSH_SPEED|default(macro.push_speed)|float %}
    {% set unload_speed = params.UNLOAD_SPEED|default(macro.unload_speed)|float %}
    {% set turn_off_extruder = macro.turn_off_extruder|int %}

    SAVE_GCODE_STATE NAME=unload_state

    {% if target_temp < min_temp %}
        {% set target_temp = min_temp %}
    {% endif %}

    ; Heat if needed
    {% if printer.extruder.temperature < target_temp %}
        M104 S{target_temp}
        M109 S{target_temp}
    {% endif %}

    M83
    G92 E0

    ; Small push to shape tip before long unload
    G1 E{push_distance} F{push_speed}

    ; Long retract for Bowden
    G1 E-{unload_distance} F{unload_speed}

    {% if turn_off_extruder == 1 %}
        M104 S0
    {% endif %}

    RESTORE_GCODE_STATE NAME=unload_state
    M117 Filament unloaded

   
############################################################

[gcode_macro LOAD_FILAMENT]
description: Safe filament load for Bowden setup
variable_load_distance: 420
variable_purge_distance: 25
variable_nozzle_preheat_temp: 220
variable_turn_off_extruder: 0
variable_load_speed: 900
variable_purge_speed: 180
gcode:
    {% set macro = printer["gcode_macro LOAD_FILAMENT"] %}
    {% set target_temp = params.TARGET_TEMP|default(macro.nozzle_preheat_temp)|float %}
    {% set min_temp = params.MIN_TEMP|default(180)|float %}
    {% set load_distance = params.LOAD_DISTANCE|default(macro.load_distance)|float %}
    {% set purge_distance = params.PURGE_DISTANCE|default(macro.purge_distance)|float %}
    {% set load_speed = params.LOAD_SPEED|default(macro.load_speed)|float %}
    {% set purge_speed = params.PURGE_SPEED|default(macro.purge_speed)|float %}
    {% set turn_off_extruder = macro.turn_off_extruder|int %}

    SAVE_GCODE_STATE NAME=load_state

    {% if target_temp < min_temp %}
        {% set target_temp = min_temp %}
    {% endif %}

    ; Heat if needed
    {% if printer.extruder.temperature < target_temp %}
        M104 S{target_temp}
        M109 S{target_temp}
    {% endif %}

    M83
    G92 E0

    ; Long push through Bowden tube
    G1 E{load_distance} F{load_speed}

    ; Slow purge to fully fill hotend and nozzle
    G1 E{purge_distance} F{purge_speed}

    {% if turn_off_extruder == 1 %}
        M104 S0
    {% endif %}

    RESTORE_GCODE_STATE NAME=load_state
    M117 Filament loaded